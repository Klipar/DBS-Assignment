name: cinema

services:
  db:
    image: postgres:15-alpine
    container_name: cinema_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/67-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/69-seed.sql

volumes:
  postgres_data:
    name: cinema_data
